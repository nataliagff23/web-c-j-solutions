<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Fine grid -->
    <pattern id="fineGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(250,246,234,0.04)" stroke-width="1"/>
    </pattern>
    <!-- Major grid -->
    <pattern id="majorGrid" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="url(#fineGrid)"/>
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="rgba(250,246,234,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background grid -->
  <rect width="100%" height="100%" fill="url(#majorGrid)"/>

  <!-- Architectural plan elements (cream stroke, low opacity) -->
  <g stroke="rgba(250,246,234,0.16)" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- House section / elevation, left side -->
    <g transform="translate(100,500)">
      <!-- House outline -->
      <path d="M 0 0 L 0 -180 L 100 -260 L 200 -180 L 200 0 Z"/>
      <!-- Roof line -->
      <path d="M -20 -170 L 100 -270 L 220 -170"/>
      <!-- Floor line -->
      <line x1="-20" y1="0" x2="220" y2="0"/>
      <!-- Windows -->
      <rect x="20" y="-130" width="40" height="55"/>
      <line x1="40" y1="-130" x2="40" y2="-75"/>
      <line x1="20" y1="-102" x2="60" y2="-102"/>
      <rect x="140" y="-130" width="40" height="55"/>
      <line x1="160" y1="-130" x2="160" y2="-75"/>
      <line x1="140" y1="-102" x2="180" y2="-102"/>
      <!-- Door -->
      <rect x="85" y="-60" width="30" height="60"/>
      <circle cx="105" cy="-30" r="1.5" fill="rgba(250,246,234,0.4)"/>
      <!-- Chimney -->
      <rect x="50" y="-260" width="14" height="40"/>
      <!-- Dimension line below -->
      <line x1="0" y1="20" x2="200" y2="20" stroke-dasharray="2 3"/>
      <line x1="0" y1="14" x2="0" y2="26"/>
      <line x1="200" y1="14" x2="200" y2="26"/>
      <text x="100" y="36" fill="rgba(250,246,234,0.28)" font-family="monospace" font-size="11" text-anchor="middle" letter-spacing="1">2400 mm</text>
      <!-- Dimension line side -->
      <line x1="220" y1="0" x2="220" y2="-260" stroke-dasharray="2 3"/>
      <line x1="214" y1="0" x2="226" y2="0"/>
      <line x1="214" y1="-260" x2="226" y2="-260"/>
      <text x="240" y="-130" fill="rgba(250,246,234,0.28)" font-family="monospace" font-size="11" letter-spacing="1">3120</text>
    </g>

    <!-- Floor plan, top-right -->
    <g transform="translate(1050,140)">
      <!-- Outer walls -->
      <rect x="0" y="0" width="380" height="260" stroke-width="1.8"/>
      <!-- Interior walls -->
      <line x1="160" y1="0" x2="160" y2="180"/>
      <line x1="0" y1="180" x2="380" y2="180"/>
      <line x1="260" y1="180" x2="260" y2="260"/>
      <!-- Door arcs -->
      <path d="M 70 0 A 40 40 0 0 0 30 40 L 70 40 Z" opacity="0.55"/>
      <path d="M 160 90 A 30 30 0 0 1 190 60" stroke-dasharray="1 3" opacity="0.6"/>
      <path d="M 260 220 A 25 25 0 0 1 285 195" stroke-dasharray="1 3" opacity="0.6"/>
      <!-- Furniture hints -->
      <rect x="20" y="60" width="100" height="40" opacity="0.5"/>
      <rect x="20" y="120" width="60" height="30" opacity="0.5"/>
      <circle cx="290" cy="90" r="22" opacity="0.5"/>
      <rect x="190" y="210" width="50" height="30" opacity="0.5"/>
      <!-- Labels -->
      <text x="10" y="14" fill="rgba(250,246,234,0.28)" font-family="monospace" font-size="9" letter-spacing="1.2">LIVING</text>
      <text x="170" y="14" fill="rgba(250,246,234,0.28)" font-family="monospace" font-size="9" letter-spacing="1.2">KITCHEN</text>
      <text x="10" y="194" fill="rgba(250,246,234,0.28)" font-family="monospace" font-size="9" letter-spacing="1.2">BEDROOM</text>
      <text x="270" y="194" fill="rgba(250,246,234,0.28)" font-family="monospace" font-size="9" letter-spacing="1.2">BATH</text>
      <!-- Dimension top -->
      <line x1="0" y1="-18" x2="380" y2="-18" stroke-dasharray="2 3"/>
      <text x="190" y="-24" fill="rgba(250,246,234,0.28)" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="1">12.40 m</text>
    </g>

    <!-- Skyline silhouette bottom-right -->
    <g transform="translate(700,720)" opacity="0.85">
      <path d="M 0 0 L 0 -120 L 60 -120 L 60 -90 L 120 -90 L 120 -150 L 180 -150 L 180 -100 L 230 -100 L 230 -180 L 290 -180 L 290 -130 L 360 -130 L 360 -160 L 420 -160 L 420 -100 L 500 -100 L 500 -140 L 560 -140 L 560 -110 L 620 -110 L 620 -130 L 700 -130 L 700 0 Z"/>
      <!-- windows pattern -->
      <g stroke-width="0.8" opacity="0.6">
        <rect x="15" y="-100" width="6" height="10"/>
        <rect x="30" y="-100" width="6" height="10"/>
        <rect x="45" y="-100" width="6" height="10"/>
        <rect x="15" y="-75" width="6" height="10"/>
        <rect x="30" y="-75" width="6" height="10"/>
        <rect x="135" y="-130" width="6" height="10"/>
        <rect x="150" y="-130" width="6" height="10"/>
        <rect x="165" y="-130" width="6" height="10"/>
        <rect x="135" y="-110" width="6" height="10"/>
        <rect x="245" y="-160" width="6" height="10"/>
        <rect x="260" y="-160" width="6" height="10"/>
        <rect x="275" y="-160" width="6" height="10"/>
        <rect x="245" y="-140" width="6" height="10"/>
        <rect x="260" y="-140" width="6" height="10"/>
      </g>
    </g>

    <!-- Compass / north arrow bottom-left -->
    <g transform="translate(140,800)" opacity="0.55">
      <circle r="22"/>
      <path d="M 0 -16 L 6 8 L 0 4 L -6 8 Z" fill="rgba(250,246,234,0.18)"/>
      <text x="0" y="-26" fill="rgba(250,246,234,0.32)" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="1.5">N</text>
    </g>

    <!-- Cross-hair scale marker top-left -->
    <g transform="translate(140,140)" opacity="0.5">
      <line x1="-14" y1="0" x2="14" y2="0"/>
      <line x1="0" y1="-14" x2="0" y2="14"/>
      <circle r="4"/>
      <text x="22" y="4" fill="rgba(250,246,234,0.32)" font-family="monospace" font-size="9" letter-spacing="1">A-01</text>
    </g>

    <!-- Drawing border + title block (bottom) -->
    <rect x="60" y="60" width="1480" height="780" stroke-width="1.3" opacity="0.35"/>
    <line x1="60" y1="820" x2="1540" y2="820" opacity="0.4"/>
    <text x="80" y="836" fill="rgba(250,246,234,0.32)" font-family="monospace" font-size="10" letter-spacing="2">C&amp;J SOLUTIONSFL · CONSTRUCTION &amp; REMODELING · JACKSONVILLE FL</text>
    <text x="1200" y="836" fill="rgba(250,246,234,0.32)" font-family="monospace" font-size="10" letter-spacing="2">SHEET A-01 · SCALE 1:100</text>
  </g>

  <!-- Orange accent glow elements -->
  <g>
    <circle cx="1280" cy="650" r="6" fill="#F47A1F" opacity="0.55"/>
    <circle cx="1280" cy="650" r="14" fill="none" stroke="#F47A1F" stroke-width="1" opacity="0.35"/>
    <line x1="1280" y1="650" x2="1380" y2="580" stroke="#F47A1F" stroke-width="1" opacity="0.35" stroke-dasharray="3 4"/>
    <text x="1390" y="576" fill="#F47A1F" opacity="0.65" font-family="monospace" font-size="10" letter-spacing="1.5">YOUR PROJECT</text>
  </g>
</svg>
